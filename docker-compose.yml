version: '3.9'

services:
  api:
    container_name: api
    image: steshabolk/coffee-house-api
    # build: ./coffee-house-api
    restart: always
    ports:
      - '8085:8085'
    depends_on:
      - postgres
    environment:
      TZ: Europe/Moscow
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coffee-house-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      FRONTEND_PORT: 8088
    volumes:
      - ./logs/coffee-house-api:/api/logs

  frontend:
    container_name: frontend
    image: steshabolk/coffee-house-frontend
    # build: ./coffee-house-frontend
    restart: always
    ports:
      - '8088:8088'
    depends_on:
      - postgres
      - api

  postgres:
    container_name: postgres
    image: postgres:13.7
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee-house-db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:6.8
    restart: always
    ports:
      - '5050:5050'
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: postgres
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    depends_on:
      - postgres
    links:
      - postgres:pgsql-server
    volumes:
      - ./servers.json:/pgadmin4/servers.json

volumes:
  postgres-data:
